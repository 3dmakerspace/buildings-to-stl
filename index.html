<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OSM → STL Map Generator</title>

<link href="https://unpkg.com/maplibre-gl@^5.12.0/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@^5.12.0/dist/maplibre-gl.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script src="https://unpkg.com/earcut@2.2.4/dist/earcut.min.js"></script>

<style>
html,body{height:100%;margin:0;font-family:system-ui}
#app{height:100%;display:grid;grid-template-columns:380px 1fr}
#panel{padding:14px;border-right:1px solid #ddd;background:white}
#map{height:100%}
.btn{width:100%;padding:10px;margin-top:8px;background:#111;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.btn.secondary{background:white;color:#111;border:1px solid #111}
.card{border:1px solid #ddd;padding:10px;border-radius:10px;margin-top:10px}
.small{font-size:12px;color:#555}
.mono{font-family:monospace;font-size:12px}
input.search{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>
<div id="app">

<div id="panel">

<h2>OSM → STL</h2>

<div class="card">
<b>Search</b>
<input id="searchBox" class="search" placeholder="Search city or address">
<button id="searchBtn" class="btn">Go</button>
<button id="homeBtn" class="btn secondary">Home</button>
</div>

<div class="card">
<b>Selection</b>
<div id="status" class="small">Hold SHIFT + drag to select</div>
<div id="bounds" class="mono">—</div>

<button id="clearBtn" class="btn secondary">Clear</button>
<button id="genBtn" class="btn">Export STL</button>
</div>

<div class="card small">
Tip: Keep area small (few blocks).
</div>

</div>

<div id="map"></div>
</div>

<script type="module">

import * as THREE from "three"
import { STLExporter } from "three/addons/exporters/STLExporter.js"

const MAPTILER_KEY=KeOv6XTZTQ937QSdqTB9

const STYLE_STREETS=`https://api.maptiler.com/maps/streets-v2/style.json?key=${MAPTILER_KEY}`
const STYLE_SAT=`https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`

const map=new maplibregl.Map({
container:"map",
style:STYLE_STREETS,
center:[-73.9857,40.7484],
zoom:14
})

map.boxZoom.disable()

map.addControl(new maplibregl.NavigationControl(),"top-right")

let start=null
let selecting=false
let bounds=null

const statusEl=document.getElementById("status")
const boundsEl=document.getElementById("bounds")

function rectFeature(w,s,e,n){
return{
type:"Feature",
geometry:{type:"Polygon",coordinates:[[[w,s],[e,s],[e,n],[w,n],[w,s]]]}
}
}

function ensureLayer(){
if(map.getSource("selection"))return
map.addSource("selection",{type:"geojson",data:{type:"FeatureCollection",features:[]}})
map.addLayer({id:"selectFill",type:"fill",source:"selection",paint:{"fill-opacity":0.2}})
map.addLayer({id:"selectLine",type:"line",source:"selection",paint:{"line-width":3}})
}

map.on("load",()=>{

ensureLayer()

map.on("mousedown",e=>{

if(e.originalEvent.button!==0)return
if(!e.originalEvent.shiftKey)return

e.preventDefault()

selecting=true
start=e.lngLat

map.dragPan.disable()

})

map.on("mousemove",e=>{

if(!selecting)return

const a=start
const b=e.lngLat

const w=Math.min(a.lng,b.lng)
const e2=Math.max(a.lng,b.lng)
const s=Math.min(a.lat,b.lat)
const n=Math.max(a.lat,b.lat)

bounds={w,s,e:e2,n}

map.getSource("selection").setData({
type:"FeatureCollection",
features:[rectFeature(w,s,e2,n)]
})

boundsEl.textContent=`${w.toFixed(6)}, ${s.toFixed(6)}, ${e2.toFixed(6)}, ${n.toFixed(6)}`

})

map.on("mouseup",()=>{

if(!selecting)return

selecting=false
map.dragPan.enable()

statusEl.textContent="Selection ready"

})

})

document.getElementById("clearBtn").onclick=()=>{
bounds=null
map.getSource("selection").setData({type:"FeatureCollection",features:[]})
boundsEl.textContent="—"
}

async function searchPlace(q){

const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`
const r=await fetch(url)
const j=await r.json()

if(!j.length)return

map.flyTo({center:[parseFloat(j[0].lon),parseFloat(j[0].lat)],zoom:15})

}

document.getElementById("searchBtn").onclick=()=>{
searchPlace(document.getElementById("searchBox").value)
}

document.getElementById("homeBtn").onclick=()=>{
map.flyTo({center:[-73.9857,40.7484],zoom:14})
}

function project(lon,lat,lon0,lat0){

const R=6378137
const dlon=(lon-lon0)*Math.PI/180
const dlat=(lat-lat0)*Math.PI/180

return[
R*dlon*Math.cos(lat0*Math.PI/180),
R*dlat
]

}

function download(blob,name){

const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download=name
a.click()

}

function makeSTL(){

const group=new THREE.Group()

const geo=new THREE.BoxGeometry(100,100,5)

const mesh=new THREE.Mesh(geo)

group.add(mesh)

const exporter=new STLExporter()

const buffer=exporter.parse(group,{binary:true})

const blob=new Blob([buffer])

download(blob,"map.stl")

}

document.getElementById("genBtn").onclick=()=>{

if(!bounds){
alert("Select an area first")
return
}

makeSTL()

}

</script>
</body>
</html>
